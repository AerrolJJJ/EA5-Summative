<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Game — 4 The Game</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../arcade.css">
</head>
<body>
  <div id="container">
    <div id="dino">
      <img src="./dino.png" alt="dino">
    </div>
    <div id="block">
      <img src="./block.png" alt="blocks">
    </div>
    <div id="road">
      <img src="./road.png" alt="road">
    </div>
    <div id="cloud">
      <img src="./cloud.jpg" alt="cloud">
    </div>
    <div id="score">Score <b>00</b></div>
    <div id="startScreen">Press <b>SPACE</b> to Start<br><small>Press <b>SPACE</b> or <b>&uarr;</b> to jump &middot; tap on mobile</small></div>
    <div id="gameOver">Game Over</div>
  </div>
  <script src="../arcade.js"></script>
  <script src="file.js"></script>
  <script>
    Arcade.init({ game: 'dino', title: 'Dino Game' });
  </script>
</body>
</html>
